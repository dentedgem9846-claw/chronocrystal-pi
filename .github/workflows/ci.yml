name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and typecheck
        run: bun run check

      - name: Run tests
        run: bun test

      - name: Build Docker image
        run: docker build --tag chronocrystal-pi:ci .

  deploy-preview:
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_KEY }}
      RAILWAY_SERVICE: ${{ vars.RAILWAY_PREVIEW_SERVICE || vars.RAILWAY_SERVICE }}
      RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_PREVIEW_ENVIRONMENT }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy preview to Railway
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::notice::Skipping preview deploy; configure the RAILWAY_API_KEY GitHub secret."
            exit 0
          fi

          args=(up --ci)

          if [ -n "${RAILWAY_SERVICE:-}" ]; then
            args+=(--service "$RAILWAY_SERVICE")
          fi

          if [ -n "${RAILWAY_PROJECT_ID:-}" ]; then
            if [ -z "${RAILWAY_ENVIRONMENT:-}" ]; then
              echo "::error::RAILWAY_PROJECT_ID requires RAILWAY_PREVIEW_ENVIRONMENT."
              exit 1
            fi
            args+=(--project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT")
          elif [ -n "${RAILWAY_ENVIRONMENT:-}" ]; then
            args+=(--environment "$RAILWAY_ENVIRONMENT")
          fi

          railway "${args[@]}"

  preview-healthcheck:
    if: github.event_name == 'push' && github.ref != 'refs/heads/main' && vars.RAILWAY_PREVIEW_HEALTHCHECK_URL != ''
    needs: deploy-preview
    runs-on: ubuntu-latest
    env:
      HEALTHCHECK_URL: ${{ vars.RAILWAY_PREVIEW_HEALTHCHECK_URL }}
    steps:
      - name: Wait for preview healthcheck
        shell: bash
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 300))

          while [ "$SECONDS" -lt "$deadline" ]; do
            response="$(curl --silent --show-error --fail "$HEALTHCHECK_URL")" && {
              echo "$response"
              echo "$response" | grep -F '"status":"ok"' >/dev/null
              exit 0
            }
            sleep 5
          done

          echo "::error::Preview health check did not return 200 with {\"status\":\"ok\"}: $HEALTHCHECK_URL"
          exit 1

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_KEY }}
      RAILWAY_SERVICE: ${{ vars.RAILWAY_PRODUCTION_SERVICE || vars.RAILWAY_SERVICE }}
      RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy production to Railway
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::notice::Skipping production deploy; configure the RAILWAY_API_KEY GitHub secret."
            exit 0
          fi

          args=(up --ci)

          if [ -n "${RAILWAY_SERVICE:-}" ]; then
            args+=(--service "$RAILWAY_SERVICE")
          fi

          if [ -n "${RAILWAY_PROJECT_ID:-}" ]; then
            if [ -z "${RAILWAY_ENVIRONMENT:-}" ]; then
              echo "::error::RAILWAY_PROJECT_ID requires RAILWAY_PRODUCTION_ENVIRONMENT."
              exit 1
            fi
            args+=(--project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT")
          elif [ -n "${RAILWAY_ENVIRONMENT:-}" ]; then
            args+=(--environment "$RAILWAY_ENVIRONMENT")
          fi

          railway "${args[@]}"

  production-healthcheck:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.RAILWAY_PRODUCTION_HEALTHCHECK_URL != ''
    needs: deploy-production
    runs-on: ubuntu-latest
    env:
      HEALTHCHECK_URL: ${{ vars.RAILWAY_PRODUCTION_HEALTHCHECK_URL }}
    steps:
      - name: Wait for production healthcheck
        shell: bash
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 300))

          while [ "$SECONDS" -lt "$deadline" ]; do
            response="$(curl --silent --show-error --fail "$HEALTHCHECK_URL")" && {
              echo "$response"
              echo "$response" | grep -F '"status":"ok"' >/dev/null
              exit 0
            }
            sleep 5
          done

          echo "::error::Production health check did not return 200 with {\"status\":\"ok\"}: $HEALTHCHECK_URL"
          exit 1

  monitor-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [deploy-production, production-healthcheck]
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_KEY }}
      RAILWAY_SERVICE: ${{ vars.RAILWAY_PRODUCTION_SERVICE || vars.RAILWAY_SERVICE }}
      RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_PRODUCTION_ENVIRONMENT }}
    steps:
      - name: Tail Railway logs for 10 minutes
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::notice::Skipping Railway log tail; configure the RAILWAY_API_KEY GitHub secret."
            exit 0
          fi

          args=(logs)

          if [ -n "${RAILWAY_SERVICE:-}" ]; then
            args+=(--service "$RAILWAY_SERVICE")
          fi

          if [ -n "${RAILWAY_ENVIRONMENT:-}" ]; then
            args+=(--environment "$RAILWAY_ENVIRONMENT")
          fi

          log_file="$(mktemp)"
          status=0
          timeout 600 railway "${args[@]}" | tee "$log_file" || status=$?

          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            echo "::error::railway logs exited with $status"
            exit "$status"
          fi

          if grep -Eqi 'fatal|uncaught|listener error|reply failed|live message failed|startup failed|chatCmdError' "$log_file"; then
            echo "::error::Suspicious error patterns detected in Railway logs."
            exit 1
          fi

          echo "No suspicious error patterns detected during the 10 minute log tail."
